<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Digital Security Hub — DamuMed Analysis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-base: #05080f;
    --bg-card: rgba(10,18,35,0.85);
    --bg-glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07);
    --border-glow: rgba(0,200,255,0.25);
    --accent-cyan: #00c8ff;
    --accent-teal: #00e5c0;
    --accent-amber: #ffb700;
    --accent-red: #ff3b5c;
    --accent-orange: #ff7a00;
    --text-primary: #e8eef7;
    --text-secondary: #7a92b4;
    --text-dim: #3d5270;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 0%, rgba(0,200,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(0,229,192,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,80,160,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  .font-display { font-family: 'Syne', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  
  .glass-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }
  .glass-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
    pointer-events: none; border-radius: inherit;
  }
  .glass-card:hover {
    border-color: var(--border-glow);
    box-shadow: 0 0 40px rgba(0,200,255,0.08), 0 20px 60px rgba(0,0,0,0.5);
    transform: translateY(-2px);
  }

  
  .main-tab-btn {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid transparent;
    color: var(--text-secondary);
    background: transparent;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; align-items: center; gap: 8px;
  }
  .main-tab-btn:hover { color: var(--text-primary); background: var(--bg-glass); }
  .main-tab-btn.active {
    color: var(--accent-cyan);
    background: rgba(0,200,255,0.08);
    border-color: rgba(0,200,255,0.2);
    box-shadow: 0 0 20px rgba(0,200,255,0.12);
  }

  .sub-tab-btn {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 8px 18px; border-radius: 8px; border: 1px solid transparent;
    color: var(--text-secondary); background: transparent; cursor: pointer;
    transition: all 0.22s; display: flex; align-items: center; gap: 6px;
  }
  .sub-tab-btn:hover { color: var(--text-primary); }
  .sub-tab-btn.active {
    color: var(--accent-teal);
    background: rgba(0,229,192,0.08);
    border-color: rgba(0,229,192,0.2);
  }

  
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 6px;
  }
  .badge-critical { background: rgba(255,59,92,0.15); color: #ff3b5c; border: 1px solid rgba(255,59,92,0.3); }
  .badge-high     { background: rgba(255,122,0,0.15);  color: #ff7a00; border: 1px solid rgba(255,122,0,0.3); }
  .badge-medium   { background: rgba(255,183,0,0.12);  color: #ffb700; border: 1px solid rgba(255,183,0,0.25); }

  
  .progress-track {
    height: 6px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-teal));
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px rgba(0,200,255,0.5);
  }
  .progress-fill.danger { background: linear-gradient(90deg, #ff3b5c, #ff7a00); box-shadow: 0 0 12px rgba(255,59,92,0.5); }
  .progress-fill.warn   { background: linear-gradient(90deg, #ffb700, #ff7a00); box-shadow: 0 0 12px rgba(255,183,0,0.5); }

  
  .stat-number {
    font-family: 'Syne', sans-serif; font-size: 2.6rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-teal));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1;
  }
  .stat-number.danger {
    background: linear-gradient(135deg, #ff3b5c, #ff7a00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .stat-number.warn {
    background: linear-gradient(135deg, #ffb700, #ff7a00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  
  .check-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 18px; border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-glass);
    transition: all 0.22s; cursor: pointer;
  }
  .check-item:hover { border-color: rgba(0,229,192,0.25); background: rgba(0,229,192,0.04); }
  .check-item.done { opacity: 0.55; }
  .check-box {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; margin-top: 2px;
    border: 2px solid var(--text-dim); display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .check-item.done .check-box { background: var(--accent-teal); border-color: var(--accent-teal); }
  .check-num {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
    margin-top: 3px; min-width: 20px;
  }

  
  .policy-row {
    padding: 18px 20px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--bg-glass);
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .policy-row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 2px; transition: background 0.25s;
  }
  .policy-row.critical::before { background: var(--accent-red); }
  .policy-row.high::before    { background: var(--accent-orange); }
  .policy-row.medium::before  { background: var(--accent-amber); }
  .policy-row:hover { border-color: var(--border-glow); transform: translateX(4px); }

  
  .lang-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border); color: var(--text-secondary);
    background: transparent; cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
  .lang-btn.active { color: var(--accent-cyan); border-color: rgba(0,200,255,0.35); background: rgba(0,200,255,0.07); }

  
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

  
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-up { animation: fadeUp 0.55s ease both; }
  .fade-up-d1 { animation-delay: 0.08s; }
  .fade-up-d2 { animation-delay: 0.16s; }
  .fade-up-d3 { animation-delay: 0.24s; }

  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,200,255,0.0); }
    50%      { box-shadow: 0 0 0 6px rgba(0,200,255,0.08); }
  }
  .pulse { animation: pulse-glow 3s ease infinite; }

  
  .scan-line {
    position: relative; overflow: hidden;
  }
  .scan-line::after {
    content: '';
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.06), transparent);
    animation: scan 4s ease-in-out infinite;
  }
  @keyframes scan { 0%{left:-60%} 100%{left:160%} }

  
  .glow-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-teal), transparent);
    opacity: 0.4;
  }

  
  .tooltip-wrap { position: relative; }
  .tooltip-wrap .tooltip-box {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%); background: #0d1829; border: 1px solid var(--border-glow);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; z-index: 100; pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .tooltip-wrap:hover .tooltip-box { display: block; }

  
  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  
  .icon-circle {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  
  .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border);
  }

 
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  
  .brand-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-teal));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(0,200,255,0.3);
  }

  
  .counting { transition: none; }
</style>
</head>
<body>
<div id="app" class="relative z-10 min-h-screen">

  <header class="sticky top-0 z-50 scan-line" style="background:rgba(5,8,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4 flex-wrap">
      <div class="flex items-center gap-3">
        <div class="brand-logo pulse">
          <i data-lucide="shield-check" style="color:#05080f;width:20px;height:20px;stroke-width:2.5"></i>
        </div>
        <div>
          <div class="font-display font-bold text-base leading-tight" style="color:var(--text-primary)">
            Digital Security Hub
          </div>
          <div class="font-mono text-xs" style="color:var(--text-dim)">DamuMed / MSc Cybersecurity Research</div>
        </div>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-1 p-1 rounded-xl" style="background:var(--bg-glass);border:1px solid var(--border);">
          <button class="lang-btn active" onclick="setLang('en')" id="lang-en">EN</button>
          <button class="lang-btn" onclick="setLang('ru')" id="lang-ru">RU</button>
          <button class="lang-btn" onclick="setLang('kk')" id="lang-kk">KK</button>
        </div>
        <nav class="flex items-center gap-1 p-1 rounded-xl overflow-x-auto" style="background:var(--bg-glass);border:1px solid var(--border);">
          <button class="main-tab-btn active" onclick="switchTab('research')" id="tab-research">
            <i data-lucide="bar-chart-2" style="width:14px;height:14px"></i>
            <span data-t="tab_research"></span>
          </button>
          <button class="main-tab-btn" onclick="switchTab('policy')" id="tab-policy">
            <i data-lucide="file-text" style="width:14px;height:14px"></i>
            <span data-t="tab_policy"></span>
          </button>
          <button class="main-tab-btn" onclick="switchTab('guidelines')" id="tab-guidelines">
            <i data-lucide="shield" style="width:14px;height:14px"></i>
            <span data-t="tab_guidelines"></span>
          </button>
          <button class="main-tab-btn" onclick="switchTab('xai')" id="tab-xai">
            <i data-lucide="cpu" style="width:14px;height:14px"></i>
            <span data-t="tab_xai"></span>
          </button>
        </nav>
      </div>
    </div>
    <div class="glow-line"></div>
  </header>

  <div class="max-w-7xl mx-auto px-6 pt-10 pb-4">
    <div class="glass-card p-6 md:p-8 mb-8 fade-up" style="background:linear-gradient(135deg,rgba(0,200,255,0.06),rgba(0,229,192,0.04));border-color:rgba(0,200,255,0.15);">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
          <div class="tag mb-3" data-t="hero_tag"></div>
          <h1 class="font-display font-extrabold text-3xl md:text-4xl leading-tight mb-3" data-t="hero_title"></h1>
          <p class="text-sm max-w-xl" style="color:var(--text-secondary)" data-t="hero_subtitle"></p>
        </div>
        <div class="flex gap-4 flex-wrap md:flex-nowrap">
          <div class="glass-card px-6 py-4 text-center" style="min-width:110px">
            <div class="font-display font-extrabold text-2xl" style="color:var(--accent-cyan)">162</div>
            <div class="text-xs mt-1" style="color:var(--text-secondary)" data-t="hero_stat_users"></div>
          </div>
          <div class="glass-card px-6 py-4 text-center" style="min-width:110px">
            <div class="font-display font-extrabold text-2xl" style="color:var(--accent-teal)">30</div>
            <div class="text-xs mt-1" style="color:var(--text-secondary)" data-t="hero_stat_days"></div>
          </div>
          <div class="glass-card px-6 py-4 text-center" style="min-width:110px">
            <div class="font-display font-extrabold text-2xl" style="color:var(--accent-amber)">10</div>
            <div class="text-xs mt-1" style="color:var(--text-secondary)" data-t="hero_stat_risks"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-6 pb-20">

    <div id="panel-research" class="tab-panel active">
      <div class="mb-6">
        <h2 class="font-display font-bold text-xl mb-1" data-t="research_title"></h2>
        <p class="text-sm" style="color:var(--text-secondary)" data-t="research_subtitle"></p>
      </div>

      <div class="glass-card p-6 mb-6 fade-up">
        <div class="flex items-center gap-3 mb-5">
          <div class="icon-circle" style="background:rgba(0,200,255,0.1)">
            <i data-lucide="users" style="color:var(--accent-cyan);width:20px;height:20px"></i>
          </div>
          <div>
            <div class="font-display font-bold" data-t="stat1_title"></div>
            <div class="text-xs" style="color:var(--text-dim)" data-t="stat1_sub"></div>
          </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div>
            <div class="flex justify-between text-xs mb-2">
              <span data-t="demo_patients"></span>
              <span class="font-mono" style="color:var(--accent-cyan)">51%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:51%"></div></div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-2">
              <span data-t="demo_staff"></span>
              <span class="font-mono" style="color:var(--accent-teal)">22%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:22%"></div></div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-2">
              <span data-t="demo_public"></span>
              <span class="font-mono" style="color:var(--accent-amber)">18%</span>
            </div>
            <div class="progress-track"><div class="progress-fill warn" style="width:18%"></div></div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-2">
              <span data-t="demo_it"></span>
              <span class="font-mono" style="color:var(--text-secondary)">9%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:9%;opacity:0.6"></div></div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 mb-5" id="stats-grid">
        </div>
    </div>

    <div id="panel-policy" class="tab-panel">
      <div class="mb-6">
        <h2 class="font-display font-bold text-xl mb-1" data-t="policy_title"></h2>
        <p class="text-sm" style="color:var(--text-secondary)" data-t="policy_subtitle"></p>
      </div>
      <div class="flex items-center gap-4 mb-6 flex-wrap">
        <span class="badge badge-critical"><span>●</span> <span data-t="risk_critical"></span></span>
        <span class="badge badge-high"><span>●</span> <span data-t="risk_high"></span></span>
        <span class="badge badge-medium"><span>●</span> <span data-t="risk_medium"></span></span>
        <span class="text-xs ml-auto" style="color:var(--text-dim)" data-t="policy_legend_note"></span>
      </div>
      <div class="flex flex-col gap-4" id="policy-list">
        </div>
    </div>

    <div id="panel-guidelines" class="tab-panel">
      <div class="mb-6">
        <h2 class="font-display font-bold text-xl mb-1" data-t="guide_title"></h2>
        <p class="text-sm" style="color:var(--text-secondary)" data-t="guide_subtitle"></p>
      </div>
      <div class="flex items-center gap-2 mb-6 p-1 rounded-xl" style="background:var(--bg-glass);border:1px solid var(--border);width:fit-content">
        <button class="sub-tab-btn active" onclick="switchSubTab('patients')" id="subtab-patients">
          <i data-lucide="user" style="width:13px;height:13px"></i>
          <span data-t="role_patients"></span>
        </button>
        <button class="sub-tab-btn" onclick="switchSubTab('staff')" id="subtab-staff">
          <i data-lucide="stethoscope" style="width:13px;height:13px"></i>
          <span data-t="role_staff"></span>
        </button>
        <button class="sub-tab-btn" onclick="switchSubTab('it')" id="subtab-it">
          <i data-lucide="server" style="width:13px;height:13px"></i>
          <span data-t="role_it"></span>
        </button>
      </div>
      <div id="guide-patients" class="guide-panel"></div>
      <div id="guide-staff"    class="guide-panel" style="display:none"></div>
      <div id="guide-it"       class="guide-panel" style="display:none"></div>
    </div>

    <div id="panel-xai" class="tab-panel">
      <div class="mb-6">
        <h2 class="font-display font-bold text-xl mb-1" data-t="xai_title"></h2>
        <p class="text-sm" style="color:var(--text-secondary)" data-t="xai_subtitle"></p>
      </div>
      
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="glass-card p-6 lg:col-span-1 fade-up">
          <h3 class="font-display font-bold mb-5" style="color:var(--accent-cyan)" data-t="xai_params"></h3>
          
          <div class="mb-6">
            <label class="text-xs mb-2 block" style="color:var(--text-secondary)"><span data-t="xai_bmi"></span>: <span id="xai-bmi-val" class="font-mono text-white">25</span></label>
            <input type="range" id="xai-bmi" min="15" max="50" value="25" class="w-full" style="accent-color: var(--accent-cyan);" oninput="updateXAI()">
          </div>
          
          <div class="mb-6">
            <label class="text-xs mb-2 block" style="color:var(--text-secondary)" data-t="xai_genetics"></label>
            <select id="xai-genetics" class="w-full border rounded-lg p-2 text-sm text-white" style="background:var(--bg-card); border-color:var(--border);" onchange="updateXAI()">
              <option value="0" style="background:#05080f" data-t="xai_gen_low"></option>
              <option value="15" style="background:#05080f" data-t="xai_gen_med"></option>
              <option value="30" style="background:#05080f" data-t="xai_gen_high"></option>
            </select>
          </div>

          <div class="mb-4 flex items-center justify-between">
            <label class="text-xs" style="color:var(--text-secondary)" data-t="xai_typo"></label>
            <input type="checkbox" id="xai-typo" class="w-4 h-4" style="accent-color: var(--accent-red);" onchange="updateXAI()">
          </div>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-6">
          
          <div class="glass-card p-6 fade-up" style="border-color: rgba(255,59,92,0.3);">
            <div class="flex items-center gap-3 mb-4">
              <i data-lucide="box" style="color:var(--accent-red)"></i>
              <h3 class="font-display font-bold text-sm" data-t="xai_bb_title"></h3>
            </div>
            <p class="text-xs mb-2" style="color:var(--text-dim)" data-t="xai_bb_desc"></p>

    g_p3_desc: "Если регистратура отказывается удалять неверные данные в профиле DamuMed, не сдавайтесь. Подайте официальную жалобу через портал «e-Otinish», чтобы заставить их соблюдать закон.",
    g_p4_title: "Изолируйте номера для e-Gov",
    g_p4_desc: "DamuMed связан с Базой мобильных граждан через ИИН. Используйте отдельный номер телефона для медицинских приложений и банкинга, чтобы снизить риски кражи (SIM-свопинга).",
    g_p5_title: "Блокируйте доступ после телемедицины",
    g_p5_desc: "DamuMed запрашивает микрофон/камеру для онлайн-консультаций. Отзывайте эти разрешения в настройках ОС сразу после звонка для предотвращения фонового прослушивания.",
    g_p6_title: "Отвяжите независимых родственников",
    g_p6_desc: "DamuMed автоматически связывает профили семьи. Отвяжите совершеннолетних детей или родителей со своими смартфонами, чтобы предотвратить утечку данных при взломе одного устройства.",
    g_p7_title: "Откажитесь от передачи данных аптекам",
    g_p7_desc: "Явно откажитесь от передачи рецептов сторонним партнерским аптекам внутри приложения, так как нет никаких гарантий, что они когда-либо удалят ваши данные.",
    g_p8_title: "Требуйте контроля со стороны человека",
    g_p8_desc: "При назначении лечения на базе подсказок DamuMed, спросите врача: «Это рекомендация алгоритма (CDSS) или ваше независимое клиническое заключение?»",
    g_p9_title: "Контролируйте запросы OTP",
    g_p9_desc: "DamuMed использует SMS-коды. Если вы получили неожиданный код, это сигнал о попытке взлома профиля по ИИН (брутфорс). Немедленно обратитесь в поддержку.",
    g_p10_title: "Официальный протокол удаления",
    g_p10_desc: "Удаление приложения DamuMed с телефона не удаляет ваш медицинский профиль. Вы должны подать официальное заявление на удаление данных в администрацию клиники.",

    g_s1_title: "PACS вместо WhatsApp",
    g_s1_desc: "Прекратите пересылать рентгены в WhatsApp. Если в DamuMed нет быстрого просмотра DICOM, требуйте от ИТ внедрения защищенного локального PACS-чата, ссылаясь на закон о защите персональных данных.",
    g_s2_title: "Документируйте отказы от алгоритма",
    g_s2_desc: "Если вы не согласны с подсказкой Системы поддержки принятия решений (ИИ) DamuMed, задокументируйте свое клиническое обоснование в примечаниях, чтобы избежать алгоритмической ответственности.",
    g_s3_title: "Остановите квотные приписки",
    g_s3_desc: "Никогда не создавайте фиктивные приемы ради квот. Это отравляет централизованную базу данных, создавая эффект «мусор на входе — мусор на выходе» (GIGO) для будущих моделей ИИ.",
    g_s4_title: "Блокируйте общие терминалы",
    g_s4_desc: "Врачи делят ПК. Если вы отойдете, не выйдя из DamuMed, любая ошибка ИИ или человека, сделанная на этом терминале, будет юридически привязана к вашему ИИН.",
    g_s5_title: "Прямой ввод ИИН",

    g_s6_title: "Сообщайте об ошибках интерфейса",
    g_s6_desc: "Если в выпадающем меню DamuMed нет нужного диагноза, не выбирайте «случайный» похожий. Пишите в ИТ-отдел. Неверные коды фатально искажают предиктивные модели ИИ.",
    g_s7_title: "Информируйте пациентов об ИИ",
    g_s7_desc: "Объясняя риски, рассчитанные инструментами DamuMed, юридически защитите себя фразой: «Система рассчитала это на основе вашей электронной истории болезни».",
    g_s8_title: "Проверяйте сводные данные",
    g_s8_desc: "DamuMed агрегирует анализы из сторонних частных клиник. Всегда перепроверяйте у пациента необычные внешние результаты, прежде чем ставить на их основе критический диагноз.",
    g_s9_title: "Не ставьте приложение на личный телефон",
    g_s9_desc: "Не устанавливайте приложение DamuMed Doctor на личный смартфон без корпоративного управления (MDM), на котором полно трекеров из социальных сетей.",
    g_s10_title: "Никогда не передавайте смарт-карты",

    g_i3_desc: "Врачи делятся паролями из-за медленного ввода. Внедрите быструю аппаратную MFA (NFC-бейджи или ключи FIDO2), чтобы исключить операционные оправдания для передачи паролей.",

function t(key) { return (T[currentLang] && T[currentLang][key]) || T['en'][key] || key; }

function updateTranslations() {
  document.querySelectorAll('[data-t]').forEach(el => {
    el.textContent = t(el.getAttribute('data-t'));
  });
}

function renderStatCards() {
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  statCards.forEach(cfg => {
    const val = t(cfg.key + '_val');
    const col = t(cfg.key + '_color');
    const numClass = col === 'danger' ? 'danger' : col === 'warn' ? 'warn' : '';
    const barClass = col === 'danger' ? 'danger' : col === 'warn' ? 'warn' : '';
  
    const numStr = val.replace('%','').replace('/5','');
    const num = parseFloat(numStr);
    let pct = 0;
    if (val.includes('%')) pct = Math.min(num, 100);
    else if (val.includes('/5')) pct = (num / 5) * 100;

    const card = document.createElement('div');
    card.className = 'glass-card p-6 fade-up';
    card.innerHTML = `
      <div class="flex items-start justify-between mb-4">
        <div class="icon-circle" style="background:rgba(255,255,255,0.05)">
          <i data-lucide="${cfg.icon}" style="color:${cfg.iconColor};width:20px;height:20px"></i>
        </div>
        <span class="stat-number ${numClass}">${val}</span>
      </div>
      <div class="font-display font-bold text-sm mb-1">${t(cfg.key + '_title')}</div>
      <p class="text-xs mb-4" style="color:var(--text-secondary)">${t(cfg.key + '_desc')}</p>
      ${pct > 0 ? `<div class="progress-track"><div class="progress-fill ${barClass}" style="width:${pct}%"></div></div>` : ''}
    `;
    grid.appendChild(card);
  });
  lucide.createIcons();
}

function riskLabel(risk) {
  const map = { CRITICAL: 'risk_critical', HIGH: 'risk_high', MEDIUM: 'risk_medium' };
  return t(map[risk] || 'risk_medium');
}
function riskBadgeClass(risk) {
  const map = { CRITICAL: 'badge-critical', HIGH: 'badge-high', MEDIUM: 'badge-medium' };
  return map[risk] || 'badge-medium';
}
function riskRowClass(risk) {
  const map = { CRITICAL: 'critical', HIGH: 'high', MEDIUM: 'medium' };
  return map[risk] || 'medium';
}
function riskIcon(risk) {
  const map = { CRITICAL: 'alert-octagon', HIGH: 'alert-triangle', MEDIUM: 'info' };
  return map[risk] || 'info';
}

          </div>
          <div class="flex items-start gap-2">
            <i data-lucide="arrow-right" style="width:12px;height:12px;flex-shrink:0;margin-top:4px;color:var(--accent-cyan)"></i>
            <p class="text-sm" style="color:var(--text-secondary)">${t(pol.key + '_meaning')}</p>
          </div>
        </div>
      </div>
    `;
    list.appendChild(row);
  });
  lucide.createIcons();
}

function renderGuidePanel(role) {
  const panel = document.getElementById('guide-' + role);
  const keys = guideRoles[role];
  panel.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-3';
  keys.forEach((key, idx) => {
    const id = role + '-' + idx;
    const isDone = checkedItems.has(id);
    const item = document.createElement('div');
    item.className = `check-item${isDone ? ' done' : ''} fade-up`;
    item.style.animationDelay = `${idx * 0.04}s`;
    item.setAttribute('data-id', id);
    item.onclick = function() {
      if (checkedItems.has(id)) checkedItems.delete(id);
      else checkedItems.add(id);
      this.classList.toggle('done');
      const box = this.querySelector('.check-box');
      if (checkedItems.has(id)) {
        box.innerHTML = `<i data-lucide="check" style="width:12px;height:12px;color:#05080f"></i>`;
      } else {
        box.innerHTML = '';
      }
      lucide.createIcons();
    };
    item.innerHTML = `
      <div class="check-box${isDone ? '' : ''}">${isDone ? `<i data-lucide="check" style="width:12px;height:12px;color:#05080f"></i>` : ''}</div>
      <div class="min-w-0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span class="check-num">${String(idx+1).padStart(2,'0')}</span>
          <span class="font-display font-bold text-sm">${t(key + '_title')}</span>
        </div>
        <p class="text-xs" style="color:var(--text-secondary)">${t(key + '_desc')}</p>
      </div>
    `;
    grid.appendChild(item);
  });
  panel.appendChild(grid);
  lucide.createIcons();
}

function renderAllGuides() {
  ['patients','staff','it'].forEach(r => renderGuidePanel(r));
}


function updateXAI() {
  const bmi = parseInt(document.getElementById('xai-bmi').value);
  const gen = parseInt(document.getElementById('xai-genetics').value);
  const isTypo = document.getElementById('xai-typo').checked;

  document.getElementById('xai-bmi-val').innerText = bmi;

  
  let bmiRisk = Math.floor(((bmi - 15) / 35) * 40);
  if (bmiRisk < 0) bmiRisk = 0;

  let typoRisk = isTypo ? 45 : 0; 
  
  let totalRisk = bmiRisk + gen + typoRisk;
  if (totalRisk > 100) totalRisk = 100;

  
  const bbScore = document.getElementById('blackbox-score');
  bbScore.innerText = totalRisk + '%';
  if (totalRisk >= 70) {
    bbScore.style.color = 'var(--accent-red)';
  } else if (totalRisk >= 40) {
    bbScore.style.color = 'var(--accent-amber)';
  } else {
    bbScore.style.color = 'var(--accent-teal)';
  }

  
  document.getElementById('xai-bmi-bar').style.width = bmiRisk + '%';
  document.getElementById('xai-bmi-bar-val').innerText = bmiRisk + '%';

  document.getElementById('xai-gen-bar').style.width = gen + '%';
  document.getElementById('xai-gen-bar-val').innerText = gen + '%';

  const typoContainer = document.getElementById('xai-typo-container');
  if (isTypo) {
    typoContainer.style.display = 'block';
    document.getElementById('xai-typo-bar').style.width = typoRisk + '%';
    document.getElementById('xai-typo-bar-val').innerText = '+' + typoRisk + '%';
  } else {
    typoContainer.style.display = 'none';
  }
}


function switchTab(tab) {
  currentTab = tab;
  ['research','policy','guidelines','xai'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'policy') renderPolicy();
  if (tab === 'guidelines') renderAllGuides();
  if (tab === 'xai') updateXAI();
}

function switchSubTab(role) {
  currentSubTab = role;
  ['patients','staff','it'].forEach(r => {
    const el = document.getElementById('guide-' + r);
    el.style.display = r === role ? 'block' : 'none';
    document.getElementById('subtab-' + r).classList.toggle('active', r === role);
  });
}

function setLang(lang) {
  currentLang = lang;
  ['en','ru','kk'].forEach(l => {
    document.getElementById('lang-' + l).classList.toggle('active', l === lang);
  });
  updateTranslations();
  renderStatCards();
  if (currentTab === 'policy') renderPolicy();
  if (currentTab === 'guidelines') renderAllGuides();
  if (currentTab === 'xai') updateXAI();
}


document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  setLang('ru'); 
  
  
  setTimeout(() => {
    document.querySelectorAll('.progress-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0%';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { el.style.width = w; });
      });
    });
  }, 100);
});
</script>
</body>
</html>
